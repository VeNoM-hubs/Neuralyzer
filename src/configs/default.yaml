# Default configuration. Reproduces the paper's specified settings plus the
# user-confirmed choices for previously-unspecified details.
# Override any field via a custom YAML passed to train.py --config.

data:
  dataset: mock          # mock | kaggle_pitt | adress | process2
  data_root: null        # set to your dataset root (never hardcoded)
  sample_rate: 16000
  chunk_seconds: 10.0
  max_text_length: 512
  val_ratio: 0.35        # 65/35 train/val split, stratified
  num_workers: 0
  pin_memory: false
  # kaggle_pitt only: Whisper-generated transcripts + folder->label mapping.
  transcripts_file: null   # default: <data_root>/transcripts.json
  label_map: null          # default: common names (dementia/ad/cd=1, control/hc/cn/cc=0)

model:
  speech_model_name: facebook/hubert-base-ls960
  num_speech_layers: 2   # sum last N hidden layers (ablation: 1/2/3)
  pooling: asp           # asp | mean | max
  asp_bottleneck: 128
  speech_embed_dim: 768
  text_model_name: bert-base-uncased
  text_embed_dim: 768
  fusion: at_fusion      # at_fusion | concat | gmu | mutan | mfb | mfh | block
  fused_dim: 768
  # Bilinear-fusion defaults (block.bootstrap.pytorch / original papers).
  bilinear_mm_dim: 1600
  bilinear_mfb_mm_dim: 1200
  bilinear_rank: 15
  bilinear_factor: 2
  bilinear_chunks: 20
  bilinear_dropout: 0.1
  classifier_hidden: 128
  num_classes: 2
  dropout: 0.1
  mine_hidden: 512
  freeze_speech: false
  freeze_text: false

train:
  batch_size: 8
  max_epochs: 250              # raised (user request); early stopping ends sooner
  early_stopping_patience: 20  # raised from paper's 8 so longer runs aren't cut short
  optimizer: adamw
  lr: 1.0e-5                   # reduced from 2e-5 (user request); peak LR under warmup
  weight_decay: 0.01
  betas: [0.9, 0.999]
  grad_clip: 1.0
  scheduler: linear_warmup     # linear_warmup | cosine_warmup | steplr(=paper-exact)
  warmup_ratio: 0.1
  scheduler_step_size: 4       # only used when scheduler: steplr
  scheduler_gamma: 0.1         # only used when scheduler: steplr
  mine_lambda: 0.25      # ablation: 0 / 0.1 / 0.2 / 0.25 / 0.3
  seed: 42
  seeds: [42, 43, 44, 45, 46]
  device: auto
  output_dir: runs
  use_amp: false
